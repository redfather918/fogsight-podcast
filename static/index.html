<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fogsight Podcast</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="app">

    <!-- ═══ Header ═══ -->
    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <rect width="24" height="24" rx="6" fill="url(#g)"/>
                <circle cx="12" cy="7" r="3" fill="white" opacity="0.9"/>
                <path d="M7 16c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="white" stroke-width="2" opacity="0.9"/>
                <defs><linearGradient id="g" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
            </svg>
            <span>Fogsight Podcast</span>
        </div>
    </header>

    <!-- ═══ Main ═══ -->
    <main>

        <!-- State: idle ──────────────────────── -->
        <div id="state-idle" class="state active">
            <div class="upload-section">
                <h1>PDF &rarr; 讲解视频</h1>
                <p class="subtitle">上传 PDF，AI 自动生成双人播客动画视频</p>

                <div class="upload-zone" id="upload-zone">
                    <input type="file" id="file-input" accept=".pdf">
                    <div class="upload-placeholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                        <p>拖拽 PDF 到此处，或点击选择</p>
                        <span>最大 50MB · 最多 100 页</span>
                    </div>
                    <div class="upload-selected" id="file-info">
                        <span id="file-name"></span>
                        <button class="btn-reset" id="btn-reset" title="清除">&times;</button>
                    </div>
                </div>

                <div class="options">
                    <label>
                        <span>视频时长</span>
                        <select id="target-duration">
                            <option value="30">30 秒</option>
                            <option value="60" selected>60 秒</option>
                            <option value="90">90 秒</option>
                            <option value="120">2 分钟</option>
                            <option value="180">3 分钟</option>
                        </select>
                    </label>
                    <label>
                        <span>语速<span id="speech-rate-val">0</span></span>
                        <input type="range" id="speech-rate" min="-30" max="50" value="0" step="5">
                    </label>
                </div>

                <button class="btn" id="btn-submit" disabled>生成视频</button>
            </div>
        </div>

        <!-- State: processing ─────────────────── -->
        <div id="state-processing" class="state">
            <div class="processing-section">
                <h2 id="proc-title">正在生成...</h2>
                <p class="proc-stage" id="proc-stage">准备中</p>

                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="proc-pct" id="progress-pct">0%</p>

                <div id="proc-error" class="proc-error"></div>

                <button class="btn btn-ghost" id="btn-cancel">取消</button>
            </div>
        </div>

        <!-- State: done ───────────────────────── -->
        <div id="state-done" class="state">
            <div class="done-section">
                <h2>生成完成</h2>

                <div class="video-wrap">
                    <iframe id="result-animation" class="result-iframe" allow="autoplay; fullscreen"></iframe>
                </div>

                <div class="done-meta">
                    <div class="meta-item">
                        <span class="meta-label">时长</span>
                        <span id="meta-duration">—</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">大小</span>
                        <span id="meta-size">—</span>
                    </div>
                </div>

                <div class="done-actions">
                    <button class="btn" id="btn-open">全屏播放</button>
                    <button class="btn btn-ghost" id="btn-download-html">下载 HTML</button>
                    <button class="btn btn-ghost" id="btn-download-audio">下载 MP3</button>
                    <button class="btn btn-ghost" id="btn-restart">重新生成</button>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
